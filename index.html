<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>VITRU IA Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" type="image/png" href="/logo-vitru.png" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Space Grotesk', 'sans-serif'],
          },
          colors: {
            primary: "var(--color-primary, #00C9A7)", // Dynamic Primary
            secondary: "#7C3AED", // Purple
            "background-dark": "#0A0F1C",
            "card-dark": "rgba(19, 27, 44, 0.7)",
            "card-border": "rgba(255, 255, 255, 0.08)",
            // === Semantic Surface Colors ===
            "surface": "#131B2C",          // Cards, panels, elevated elements
            "surface-alt": "#0D121F",      // Slightly darker surface variant
            "surface-deep": "#0C1220",     // Deepest surface
            "surface-mid": "#0F1623",      // Mid-tone surface
            "surface-raised": "#1F2937",   // Raised elements, hover states
            // === Semantic Status Colors ===
            "status-success": "#10B981",   // Green - positive
            "status-warning": "#F59E0B",   // Amber - warnings
            "status-error": "#EF4444",     // Red - errors
            "status-info": "#3B82F6",      // Blue - info
            // === UI Colors ===
            "text-muted": "#6B7280",       // Muted text, labels
            "text-subtle": "#9CA3AF",      // Subtle text
            "text-dim": "#374151",         // Dimmed text
            "backdrop": "#050810",         // Modal backdrops
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        },
      },
    };
  </script>
  <style>
    :root {
      --color-primary: #00C9A7;
    }

    body {
      background-color: #0A0F1C;
      color: white;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .glass-panel {
      background: rgba(19, 27, 44, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.3s ease;
    }

    .glass-panel:hover {
      border-color: rgba(0, 201, 167, 0.3);
      background: rgba(19, 27, 44, 0.9);
    }

    /* Prevent iOS auto-zoom on focus */
    @media screen and (max-width: 768px) {

      input[type="text"],
      input[type="number"],
      input[type="email"],
      input[type="password"],
      input[type="search"],
      input[type="tel"],
      input[type="url"],
      textarea,
      select {
        font-size: 16px !important;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
