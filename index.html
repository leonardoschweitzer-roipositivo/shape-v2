<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>VITRU IA Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" type="image/png" href="/logo-vitru.png" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Space Grotesk', 'sans-serif'],
          },
          colors: {
            // === Dynamic Theme Colors (CSS Variables) ===
            primary: "var(--color-accent, #00C9A7)",
            secondary: "var(--color-secondary, #7C3AED)",
            "background-dark": "var(--bg-primary, #0A0F1C)",
            "card-bg": "var(--bg-card, #131B2C)",
            "card-dark": "var(--bg-card-alpha, rgba(19, 27, 44, 0.7))",
            "card-border": "var(--bg-card-border, rgba(255, 255, 255, 0.08))",
            "backdrop": "var(--bg-backdrop, #050810)",
            // === Semantic Surface Colors ===
            "surface": "var(--bg-card, #131B2C)",
            "surface-alt": "#0D121F",
            "surface-deep": "#0C1220",
            "surface-mid": "#0F1623",
            "surface-raised": "var(--bg-surface-raised, #1F2937)",
            // === Semantic Status Colors (fixed across themes) ===
            "status-success": "#10B981",
            "status-warning": "#F59E0B",
            "status-error": "#EF4444",
            "status-info": "#3B82F6",
            // === UI Text Colors ===
            "text-muted": "var(--text-disabled, #6B7280)",
            "text-subtle": "var(--text-muted, #9CA3AF)",
            "text-dim": "#374151",
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        },
      },
    };
  </script>
  <style>
    :root {
      /* === Theme Variables (Default: VITRU Original) === */
      --bg-primary: #0A0F1C;
      --bg-card: #131B2C;
      --bg-card-alpha: rgba(19, 27, 44, 0.7);
      --bg-card-border: rgba(255, 255, 255, 0.08);
      --bg-backdrop: #050810;
      --bg-surface-raised: #1F2937;
      --color-accent: #00C9A7;
      --color-secondary: #7C3AED;
      --text-primary: #FFFFFF;
      --text-secondary: #D1D5DB;
      --text-muted: #9CA3AF;
      --text-disabled: #6B7280;

      /* === Backward Compatibility Aliases === */
      --color-primary: var(--color-accent);
      --color-gold: var(--color-accent);
      --color-surface: var(--bg-card);
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .glass-panel {
      background: var(--bg-card-alpha);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--bg-card-border);
      transition: all 0.3s ease;
    }

    .glass-panel:hover {
      border-color: color-mix(in srgb, var(--color-accent) 30%, transparent);
      background: var(--bg-card);
    }

    /* Prevent iOS auto-zoom on focus */
    @media screen and (max-width: 768px) {

      input[type="text"],
      input[type="number"],
      input[type="email"],
      input[type="password"],
      input[type="search"],
      input[type="tel"],
      input[type="url"],
      textarea,
      select {
        font-size: 16px !important;
      }
    }

    /* Keyframes for Notifications Modal */
    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .animate-slide-up {
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
